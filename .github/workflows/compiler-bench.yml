name: Compiler Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compiler
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - name: Run parser benchmark
        run: cargo bench -p linea-ast --bench parser_bench
